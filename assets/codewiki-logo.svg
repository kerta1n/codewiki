<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#55efc4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1a1a2e" opacity="0"/>

  <!-- Book body -->
  <g filter="url(#shadow)">
    <!-- Book spine -->
    <rect x="108" y="100" width="40" height="312" rx="8" fill="url(#bookGrad)"/>

    <!-- Book cover back -->
    <rect x="140" y="108" width="264" height="296" rx="4" fill="#5f50d9"/>

    <!-- Book pages (stacked) -->
    <rect x="148" y="116" width="248" height="280" rx="3" fill="#dee2e6"/>
    <rect x="152" y="120" width="244" height="272" rx="3" fill="#e9ecef"/>
    <rect x="156" y="124" width="240" height="264" rx="3" fill="url(#pageGrad)"/>
  </g>

  <!-- Code brackets on the page — representing compiled knowledge -->
  <!-- Left bracket < -->
  <g stroke="url(#codeGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="230,190 200,230 230,270"/>
  </g>

  <!-- Right bracket > -->
  <g stroke="url(#codeGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="330,190 360,230 330,270"/>
  </g>

  <!-- Slash / between brackets -->
  <line x1="295" y1="185" x2="265" y2="275" stroke="url(#codeGrad)" stroke-width="8" stroke-linecap="round"/>

  <!-- Wiki-style text lines below the code symbol -->
  <g opacity="0.35">
    <rect x="190" y="300" width="170" height="6" rx="3" fill="#6C5CE7"/>
    <rect x="190" y="316" width="130" height="6" rx="3" fill="#6C5CE7"/>
    <rect x="190" y="332" width="155" height="6" rx="3" fill="#6C5CE7"/>
    <rect x="190" y="348" width="95" height="6" rx="3" fill="#6C5CE7"/>
  </g>

  <!-- Glowing dot — knowledge compiled -->
  <circle cx="280" cy="230" r="6" fill="#55efc4" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
